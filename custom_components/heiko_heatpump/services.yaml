set_dhw_setpoint:
  name: Set DHW Setpoint
  description: Set the domestic hot water target temperature.
  fields:
    temperature:
      name: Temperature
      description: Target temperature in °C (40–60).
      required: true
      selector:
        number:
          min: 40
          max: 60
          step: 1
          unit_of_measurement: "°C"

set_mode:
  name: Set Working Mode
  description: Set the heat pump working mode.
  fields:
    mode:
      name: Mode
      description: "Mode as integer (0–4) or name: standby, heating, cooling, dhw, auto."
      required: true
      selector:
        select:
          options:
            - "standby"
            - "heating"
            - "cooling"
            - "dhw"
            - "auto"

set_power:
  name: Set Power
  description: Turn the heat pump on or off.
  fields:
    power:
      name: Power
      description: true = on, false = off.
      required: true
      selector:
        boolean:

set_heating_curve:
  name: Set Heating Curve
  description: Enable or disable weather-compensated heating curve.
  fields:
    enabled:
      name: Enabled
      required: true
      selector:
        boolean:

set_hbh:
  name: Set Backup Heater (HBH)
  description: Enable or disable the auxiliary backup heater.
  fields:
    enabled:
      name: Enabled
      required: true
      selector:
        boolean:

set_dhw_storage:
  name: Set DHW Storage
  description: Enable or disable DHW storage mode.
  fields:
    enabled:
      name: Enabled
      required: true
      selector:
        boolean:

set_curve_parallel:
  name: Set Heating Curve Parallel Shift
  description: Shift the entire heating curve up or down by a fixed offset (−9 to +9 °C).
  fields:
    shift:
      name: Shift
      description: Parallel shift value in °C (−9 to +9).
      required: true
      selector:
        number:
          min: -9
          max: 9
          step: 1
          unit_of_measurement: "°C"

set_heating_stops_delta:
  name: Set Heating/Cooling Stop ΔT
  description: Water temperature ΔT above setpoint at which heating (or cooling) stops.
  fields:
    delta:
      name: Delta
      description: ΔT in °C (1–15).
      required: true
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: "°C"

set_heating_restarts_delta:
  name: Set Heating/Cooling Restart ΔT
  description: Water temperature ΔT below setpoint at which heating (or cooling) restarts.
  fields:
    delta:
      name: Delta
      description: ΔT in °C (1–15).
      required: true
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: "°C"

set_dhw_restart_delta:
  name: Set DHW Restart ΔT
  description: DHW temperature drop ΔT below setpoint at which DHW reheating restarts.
  fields:
    delta:
      name: Delta
      description: ΔT in °C (1–15).
      required: true
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: "°C"

set_curve_ambient_temp:
  name: Set Heating Curve Ambient Breakpoint
  description: Set one of the 5 ambient temperature breakpoints of the heating curve.
  fields:
    point:
      name: Point
      description: Breakpoint number (1–5, coldest to warmest).
      required: true
      selector:
        number:
          min: 1
          max: 5
          step: 1
    temperature:
      name: Temperature
      description: Ambient temperature in °C (−25 to +20).
      required: true
      selector:
        number:
          min: -25
          max: 20
          step: 1
          unit_of_measurement: "°C"

set_curve_water_temp:
  name: Set Heating Curve Water Breakpoint
  description: Set one of the 5 target water temperature breakpoints of the heating curve.
  fields:
    point:
      name: Point
      description: Breakpoint number (1–5, corresponding to ambient breakpoints 1–5).
      required: true
      selector:
        number:
          min: 1
          max: 5
          step: 1
    temperature:
      name: Temperature
      description: Target water temperature in °C (15–60).
      required: true
      selector:
        number:
          min: 15
          max: 60
          step: 1
          unit_of_measurement: "°C"

set_anti_leg_program:
  name: Set Anti-Legionella Program
  description: Enable or disable the Anti-Legionella programme.
  fields:
    enabled:
      name: Enabled
      description: true = programme on, false = programme off.
      required: true
      selector:
        boolean:

set_anti_leg_setpoint:
  name: Set Anti-Legionella Setpoint
  description: Set the target temperature for the Anti-Legionella cycle (40–70 °C).
  fields:
    temperature:
      name: Temperature
      description: Target temperature in °C (40–70). Typical legionella kill temperature is 70°C.
      required: true
      selector:
        number:
          min: 40
          max: 70
          step: 1
          unit_of_measurement: "°C"

set_anti_leg_duration:
  name: Set Anti-Legionella Duration
  description: Set how long the pump holds the Anti-Legionella setpoint temperature (1–120 min).
  fields:
    minutes:
      name: Duration
      description: Duration in minutes (1–120).
      required: true
      selector:
        number:
          min: 1
          max: 120
          step: 1
          unit_of_measurement: "min"

set_anti_leg_finish:
  name: Set Anti-Legionella Finish Time
  description: Set the Anti-Legionella cycle finish/timeout time (1–240 min).
  fields:
    minutes:
      name: Finish time
      description: Finish time in minutes (1–240).
      required: true
      selector:
        number:
          min: 1
          max: 240
          step: 1
          unit_of_measurement: "min"
