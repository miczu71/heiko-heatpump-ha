name: Auto-release on version bump

on:
  push:
    branches: [master]
    paths:
      - "custom_components/heiko_heatpump/manifest.json"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r .version custom_components/heiko_heatpump/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > /tmp/changelog.md
          else
            git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" > /tmp/changelog.md
          fi
          grep -vE "^- (Bump version|ci:)" /tmp/changelog.md > /tmp/notes.md || true
          if [ ! -s /tmp/notes.md ]; then
            cp /tmp/changelog.md /tmp/notes.md
          fi
          if [ -n "$PREV_TAG" ]; then
            printf "\n**Full Changelog**: https://github.com/miczu71/heiko-heatpump-ha/compare/%s...v%s\n" \
              "$PREV_TAG" "${{ steps.version.outputs.version }}" >> /tmp/notes.md
          fi

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: /tmp/notes.md
